<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis AI</title>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <style>
        /* (стили такие же, как были – рабочие) */
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0b0e14; color: #e0e4ec; height: 100vh; overflow: hidden; }
        #app { display: flex; height: 100vh; max-width: 1200px; margin: 0 auto; background: #111820; }
        .sidebar { width: 280px; background: #1a212c; border-right: 1px solid #2a3348; display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease; z-index: 10; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #2a3348; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 20px; color: #6c8cff; }
        .sidebar-header button { background: #2a3348; border: none; color: #fff; padding: 6px 14px; border-radius: 30px; font-size: 14px; cursor: pointer; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px 12px; }
        .chat-item { padding: 12px 14px; border-radius: 12px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: transparent; }
        .chat-item:hover { background: #262f40; }
        .chat-item.active { background: #2a3a5c; }
        .chat-item .title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .chat-item .del-btn { background: none; border: none; color: #7f8a9e; font-size: 16px; cursor: pointer; }
        .chat-item .del-btn:hover { color: #ff6b6b; }
        .sidebar-footer { padding: 12px 20px; border-top: 1px solid #2a3348; font-size: 12px; color: #7f8a9e; display: flex; justify-content: space-between; }
        .sidebar-footer button { background: none; border: none; color: #6c8cff; cursor: pointer; font-size: 12px; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .chat-header { padding: 12px 20px; border-bottom: 1px solid #2a3348; display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: #111820; }
        .chat-header .hamburger { display: none; background: none; border: none; color: #e0e4ec; font-size: 24px; cursor: pointer; }
        .chat-header .title { font-weight: 500; font-size: 16px; }
        .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; animation: fadeIn 0.25s ease; }
        .message.user { align-self: flex-end; background: #2a3a5c; border-bottom-right-radius: 4px; }
        .message.bot { align-self: flex-start; background: #1e2736; border-bottom-left-radius: 4px; }
        .message .file-label { font-size: 12px; color: #8a9bb5; margin-bottom: 4px; }
        .message img { max-width: 100%; border-radius: 10px; margin-top: 6px; }
        .message.error { background: #5c2a2a; color: #ffbaba; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .input-area { padding: 10px 16px 16px; background: #111820; border-top: 1px solid #1e2633; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        .input-row textarea { flex: 1; background: #1a212c; border: 1px solid #2a3348; border-radius: 24px; padding: 12px 16px; color: #e0e4ec; font-size: 15px; resize: none; min-height: 44px; max-height: 120px; outline: none; }
        .input-row textarea:focus { border-color: #6c8cff; }
        .input-row button { background: #6c8cff; border: none; color: #fff; width: 48px; height: 48px; border-radius: 50%; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .input-row button:active { transform: scale(0.94); }
        .input-row button.mic { background: #3a4a6a; width: 44px; height: 44px; font-size: 18px; }
        .input-row button.mic.active { background: #ff6b6b; }
        .file-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .file-buttons label { background: #1e2633; padding: 6px 14px; border-radius: 30px; font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; color: #b0c0d8; }
        .file-buttons label:active { background: #2a3348; }
        .file-buttons input[type="file"] { display: none; }
        .gen-panel { display: none; flex-direction: column; padding: 20px; gap: 16px; flex: 1; overflow-y: auto; }
        .gen-panel.visible { display: flex; }
        .gen-panel .prompt-box { background: #1a212c; padding: 16px; border-radius: 16px; border-left: 4px solid #6c8cff; }
        .gen-panel .prompt-box h3 { font-size: 16px; margin-bottom: 4px; color: #6c8cff; }
        .gen-panel textarea { background: #1a212c; border: 1px solid #2a3348; border-radius: 16px; padding: 14px; color: #e0e4ec; font-size: 15px; min-height: 80px; resize: vertical; outline: none; }
        .gen-panel textarea:focus { border-color: #6c8cff; }
        .gen-panel .gen-btn { background: #6c8cff; border: none; color: #fff; padding: 14px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .gen-panel .gen-btn:active { transform: scale(0.97); }
        .gen-result { background: #1a212c; border-radius: 16px; padding: 14px; white-space: pre-wrap; font-size: 14px; line-height: 1.5; max-height: 300px; overflow-y: auto; margin-top: 4px; }
        .gen-audio { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
        .gen-audio button { background: #2a3348; border: none; color: #fff; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        @media (max-width: 700px) {
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); width: 280px; box-shadow: 4px 0 20px rgba(0,0,0,0.6); }
            .sidebar.open { transform: translateX(0); }
            .chat-header .hamburger { display: block; }
            .main { width: 100%; }
            .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9; }
            .overlay.visible { display: block; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111820; }
        ::-webkit-scrollbar-thumb { background: #2a3348; border-radius: 10px; }
    </style>
</head>
<body>
<div id="app">
    <div class="overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>🤖 Jarvis</h2><button id="newChatBtn">+ Новый</button></div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer"><span>Всего: <span id="chatCount">0</span></span><button id="clearAllBtn">🗑 Очистить всё</button></div>
    </div>
    <div class="main">
        <div class="chat-header">
            <button class="hamburger" id="hamburgerBtn">☰</button>
            <span class="title" id="currentChatTitle">Новый чат</span>
            <span style="margin-left:auto; font-size:12px; color:#7f8a9e;" id="chatTimestamp"></span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="gen-panel" id="genPanel">
            <div class="prompt-box"><h3>🎶 Генератор песен с музыкой</h3><p>Опиши тему, стиль, настроение – я сочиню текст и создам мелодию.</p></div>
            <textarea id="genPrompt" placeholder="Например: романтичная баллада о космосе..."></textarea>
            <button class="gen-btn" id="genBtn">🎼 Сгенерировать</button>
            <div class="gen-result" id="genResult">Здесь появится текст песни...</div>
            <div class="gen-audio" id="genAudioArea" style="display:none;">
                <button id="playAudioBtn">▶ Прослушать</button>
                <button id="stopAudioBtn">⏹ Остановить</button>
            </div>
        </div>
        <div class="input-area" id="inputArea">
            <div class="file-buttons">
                <label for="imageInput">🖼 Изображение</label>
                <input type="file" id="imageInput" accept="image/*">
                <label for="fileInput">📎 Файл</label>
                <input type="file" id="fileInput" accept=".docx,.xlsx,.pdf,.pptx,.txt,.md,.csv,.json">
            </div>
            <div class="input-row">
                <textarea id="userInput" rows="1" placeholder="Напишите сообщение..."></textarea>
                <button class="mic" id="micBtn" title="Голосовой ввод">🎤</button>
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== КОНФИГ ====================
    const API_KEY = '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';
    const GROQ_ENDPOINT = 'https://api.groq.com/openai/v1/chat/completions';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // ==================== СОСТОЯНИЕ ====================
    let chats = [];
    let currentChatId = null;
    let isGenMode = false;
    let audioPlayer = null;
    let isProcessing = false;

    // ==================== ЗАГРУЗКА/СОХРАНЕНИЕ ====================
    function loadChats() {
        try {
            const data = localStorage.getItem('jarvis_chats');
            chats = data ? JSON.parse(data) : [];
        } catch(e) { chats = []; }
        if (!chats.length) {
            chats.push({ id: Date.now().toString(36), title: 'Новый чат', messages: [{ role: 'bot', content: '👋 Привет! Я Jarvis. Загружай файлы, фото или просто пиши.' }] });
        }
        currentChatId = chats[0].id;
    }
    function saveChats() {
        localStorage.setItem('jarvis_chats', JSON.stringify(chats));
        updateUI();
    }

    // ==================== UI ====================
    function updateUI() {
        renderChatList();
        renderMessages();
        updateHeader();
        document.getElementById('chatCount').textContent = chats.length;
        document.getElementById('messages').style.display = isGenMode ? 'none' : 'flex';
        document.getElementById('inputArea').style.display = isGenMode ? 'none' : 'flex';
        document.getElementById('genPanel').classList.toggle('visible', isGenMode);
    }

    function renderChatList() {
        const container = document.getElementById('chatList');
        container.innerHTML = '';
        chats.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
            const titleSpan = document.createElement('span');
            titleSpan.className = 'title';
            titleSpan.textContent = chat.title || 'Без названия';
            const delBtn = document.createElement('button');
            delBtn.className = 'del-btn';
            delBtn.textContent = '✕';
            delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteChat(chat.id); });
            div.appendChild(titleSpan);
            div.appendChild(delBtn);
            div.addEventListener('click', () => switchChat(chat.id));
            container.appendChild(div);
        });
    }

    function renderMessages() {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        const chat = chats.find(c => c.id === currentChatId);
        if (!chat) return;
        chat.messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'error' ? 'error' : msg.role}`;
            div.innerHTML = (msg.content || '').replace(/\n/g, '<br>');
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function updateHeader() {
        const chat = chats.find(c => c.id === currentChatId);
        if (chat) {
            document.getElementById('currentChatTitle').textContent = chat.title || 'Новый чат';
            const last = chat.messages[chat.messages.length-1];
            if (last && last.timestamp) {
                const d = new Date(last.timestamp);
                document.getElementById('chatTimestamp').textContent = d.toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            } else {
                document.getElementById('chatTimestamp').textContent = '';
            }
        }
    }

    function addMessage(chatId, role, content, timestamp = null) {
        const chat = chats.find(c => c.id === chatId);
        if (!chat) return;
        if (!timestamp) timestamp = Date.now();
        chat.messages.push({ role, content, timestamp });
        if (role === 'user' && chat.messages.filter(m => m.role === 'user').length === 1) {
            const short = content.length > 30 ? content.substring(0, 30)+'…' : content;
            chat.title = short || 'Новый чат';
        }
        saveChats();
        if (chatId === currentChatId && !isGenMode) {
            renderMessages();
            updateHeader();
        }
    }

    // ==================== УПРАВЛЕНИЕ ЧАТАМИ ====================
    function switchChat(id) {
        if (currentChatId === id) return;
        currentChatId = id;
        isGenMode = false;
        updateUI();
        closeSidebar();
    }
    function deleteChat(id) {
        if (chats.length <= 1) { alert('Нельзя удалить последний чат.'); return; }
        chats = chats.filter(c => c.id !== id);
        if (currentChatId === id) currentChatId = chats[0].id;
        saveChats();
    }
    function createNewChat() {
        const newChat = { id: Date.now().toString(36), title: 'Новый чат', messages: [{ role: 'bot', content: '👋 Чем могу помочь?' }] };
        chats.push(newChat);
        currentChatId = newChat.id;
        isGenMode = false;
        saveChats();
        closeSidebar();
    }
    function clearAllChats() {
        if (!confirm('Удалить все чаты?')) return;
        chats = [];
        const newChat = { id: Date.now().toString(36), title: 'Новый чат', messages: [{ role: 'bot', content: '👋 Привет! Я Jarvis.' }] };
        chats.push(newChat);
        currentChatId = newChat.id;
        isGenMode = false;
        saveChats();
    }

    // ==================== ЗАПРОС К GROQ (исправлено) ====================
    async function askGroq(messages, model = 'llama-3.3-70b-versatile', temperature = 0.7) {
        try {
            const response = await fetch(GROQ_ENDPOINT, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, messages, temperature, max_tokens: 1024 })
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `HTTP ${response.status}`);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        } catch (e) {
            console.error('Groq API error:', e);
            throw new Error(`Ошибка API: ${e.message}`);
        }
    }

    // ==================== ОТПРАВКА СООБЩЕНИЯ (ИСПРАВЛЕНО) ====================
    async function sendUserMessage(text, fileContent = null, imageBase64 = null) {
        if (isProcessing) return;
        if (!text.trim() && !fileContent && !imageBase64) return;

        const chatId = currentChatId;
        if (!chatId) return;

        isProcessing = true;
        let userMsg = text.trim() || '';
        if (fileContent) userMsg += (userMsg ? '\n' : '') + '📎 [Файл]';
        if (imageBase64) userMsg += (userMsg ? '\n' : '') + '🖼 [Изображение]';
        if (!userMsg) userMsg = 'Сообщение';

        addMessage(chatId, 'user', userMsg);

        let promptText = text.trim() || '';
        let ocrText = '';

        if (imageBase64) {
            try {
                addMessage(chatId, 'bot', '⏳ Распознаю текст с изображения...');
                const result = await Tesseract.recognize(imageBase64, 'rus+eng', { logger: m => console.log(m) });
                ocrText = result.data.text.trim();
                if (ocrText) {
                    promptText += (promptText ? '\n\n' : '') + 'Текст с изображения:\n' + ocrText;
                } else {
                    promptText += (promptText ? '\n\n' : '') + '(На изображении не найден текст)';
                }
                // удаляем временное сообщение
                const chat = chats.find(c => c.id === chatId);
                chat.messages.pop();
                saveChats();
            } catch(e) {
                console.warn('OCR error:', e);
                promptText += (promptText ? '\n\n' : '') + '(Ошибка распознавания изображения)';
            }
        }

        if (fileContent) {
            promptText += (promptText ? '\n\n' : '') + 'Содержимое файла:\n' + fileContent;
        }

        if (!promptText.trim()) {
            promptText = 'Проанализируй предоставленную информацию.';
        }

        // ---- ИСПРАВЛЕНИЕ: преобразование ролей для API ----
        const chat = chats.find(c => c.id === chatId);
        const history = chat.messages.slice(-10)
            .filter(m => m.content && m.content.trim())
            .map(m => {
                let role = m.role;
                if (role === 'bot') role = 'assistant';
                else if (role === 'error') role = 'user';
                // если роль 'user' или 'assistant' - оставляем как есть
                return { role, content: m.content };
            });

        const systemMsg = { role: 'system', content: 'Ты — Jarvis, умный помощник. Отвечай чётко, по делу. Используй информацию из файлов и изображений.' };
        const apiMessages = [systemMsg, ...history, { role: 'user', content: promptText }];

        addMessage(chatId, 'bot', '⏳ Думаю...');
        const msgList = document.querySelectorAll('.message');
        const lastMsg = msgList[msgList.length-1];

        try {
            const reply = await askGroq(apiMessages);
            lastMsg.innerHTML = reply.replace(/\n/g, '<br>');
            chat.messages[chat.messages.length-1].content = reply;
            chat.messages[chat.messages.length-1].timestamp = Date.now();
            saveChats();
            renderMessages();
            updateHeader();
        } catch (err) {
            lastMsg.innerHTML = `❌ Ошибка: ${err.message}`;
            lastMsg.className = 'message error';
            chat.messages[chat.messages.length-1].content = `❌ Ошибка: ${err.message}`;
            chat.messages[chat.messages.length-1].role = 'error';
            saveChats();
        }
        isProcessing = false;
    }

    // ==================== ОБРАБОТКА ФАЙЛОВ ====================
    async function extractTextFromFile(file) {
        const ext = file.name.split('.').pop().toLowerCase();
        const arrayBuffer = await file.arrayBuffer();

        try {
            if (ext === 'docx') {
                const result = await mammoth.extractRawText({ arrayBuffer });
                return result.value;
            } else if (ext === 'xlsx') {
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                let text = '';
                workbook.SheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    json.forEach(row => text += row.join(' ') + '\n');
                });
                return text;
            } else if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let text = '';
                for (let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(' ') + '\n';
                }
                return text;
            } else if (ext === 'pptx') {
                const zip = await JSZip.loadAsync(arrayBuffer);
                let text = '';
                const slideFiles = Object.keys(zip.files).filter(name => name.startsWith('ppt/slides/slide') && name.endsWith('.xml'));
                for (const slideFile of slideFiles) {
                    const xml = await zip.files[slideFile].async('string');
                    const matches = xml.match(/<a:t>(.*?)<\/a:t>/g);
                    if (matches) {
                        matches.forEach(m => {
                            const content = m.replace(/<a:t>/g,'').replace(/<\/a:t>/g,'');
                            text += content + ' ';
                        });
                    }
                }
                return text;
            } else {
                return await file.text();
            }
        } catch (e) {
            throw new Error(`Не удалось прочитать ${file.name}: ${e.message}`);
        }
    }

    // ==================== ГЕНЕРАЦИЯ ПЕСНИ ====================
    async function generateSong() {
        const prompt = document.getElementById('genPrompt').value.trim();
        if (!prompt) {
            document.getElementById('genResult').textContent = '❗ Введите тему или описание песни.';
            return;
        }
        document.getElementById('genResult').textContent = '⏳ Сочиняем текст...';
        try {
            const messages = [
                { role: 'system', content: 'Ты — поэт-песенник. Напиши текст песни (куплеты, припев) на заданную тему. В конце укажи BPM и тональность.' },
                { role: 'user', content: `Напиши песню на тему: ${prompt}` }
            ];
            const reply = await askGroq(messages, 'llama-3.3-70b-versatile', 0.9);
            document.getElementById('genResult').textContent = reply;
            const bpmMatch = reply.match(/BPM\s*[:\-]?\s*(\d+)/i);
            const keyMatch = reply.match(/тональность\s*[:\-]?\s*([A-G][#b]?\s*(major|minor)?)/i);
            const bpm = bpmMatch ? parseInt(bpmMatch[1]) : 120;
            const key = keyMatch ? keyMatch[1] : 'C major';
            await generateMelody(bpm, key);
            document.getElementById('genAudioArea').style.display = 'flex';
        } catch (e) {
            document.getElementById('genResult').textContent = `❌ Ошибка: ${e.message}`;
        }
    }

    async function generateMelody(bpm, key) {
        if (audioPlayer) { audioPlayer.stop(); audioPlayer.dispose(); audioPlayer = null; }
        const synth = new Tone.Synth().toDestination();
        const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
        Tone.Transport.bpm.value = bpm;
        const pattern = new Tone.Pattern((time, note) => {
            synth.triggerAttackRelease(note, '8n', time);
        }, notes, 'randomOnce');
        pattern.loop = false;
        audioPlayer = pattern;
        pattern.start(0);
        Tone.Transport.start();
        setTimeout(() => {
            if (audioPlayer) {
                Tone.Transport.stop();
                audioPlayer.stop();
                audioPlayer.dispose();
                audioPlayer = null;
                document.getElementById('genAudioArea').style.display = 'none';
            }
        }, 10000);
    }

    // ==================== ОБРАБОТЧИКИ ====================
    document.addEventListener('DOMContentLoaded', () => {
        loadChats();
        updateUI();

        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');

        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (text) {
                sendUserMessage(text);
                userInput.value = '';
                userInput.style.height = 'auto';
            }
        });
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Голос
        let recognition = null;
        const micBtn = document.getElementById('micBtn');
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;
            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('active')) {
                    recognition.stop();
                    return;
                }
                try {
                    recognition.start();
                    micBtn.classList.add('active');
                    micBtn.textContent = '⏹';
                } catch(e) {
                    alert('Микрофон не доступен');
                }
            });
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                userInput.dispatchEvent(new Event('input'));
                setTimeout(() => sendBtn.click(), 300);
            };
            recognition.onerror = (e) => {
                micBtn.classList.remove('active');
                micBtn.textContent = '🎤';
                console.warn('Speech error:', e);
            };
            recognition.onend = () => {
                micBtn.classList.remove('active');
                micBtn.textContent = '🎤';
            };
        } else {
            micBtn.style.opacity = '0.3';
            micBtn.title = 'Голос не поддерживается';
        }

        // Изображение
        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                await sendUserMessage('', null, ev.target.result);
                document.getElementById('imageInput').value = '';
            };
            reader.readAsDataURL(file);
        });

        // Файлы
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const text = await extractTextFromFile(file);
                await sendUserMessage('', text, null);
            } catch (err) {
                addMessage(currentChatId, 'error', `❌ Ошибка чтения файла: ${err.message}`);
            }
            document.getElementById('fileInput').value = '';
        });

        // Новый чат и очистка
        document.getElementById('newChatBtn').addEventListener('click', createNewChat);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllChats);

        // Гамбургер
        document.getElementById('hamburgerBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('visible');
        });
        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('visible');
        });
        document.getElementById('messages').addEventListener('click', () => {
            if (window.innerWidth <= 700) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('visible');
            }
        });

        // Генерация песен
        document.getElementById('genBtn').addEventListener('click', generateSong);
        document.getElementById('playAudioBtn').addEventListener('click', () => {
            if (audioPlayer) Tone.Transport.start();
        });
        document.getElementById('stopAudioBtn').addEventListener('click', () => {
            if (audioPlayer) {
                Tone.Transport.stop();
                audioPlayer.stop();
                audioPlayer.dispose();
                audioPlayer = null;
                document.getElementById('genAudioArea').style.display = 'none';
            }
        });

        // Переключение режима генерации (двойной клик по заголовку)
        document.getElementById('currentChatTitle').addEventListener('dblclick', () => {
            isGenMode = !isGenMode;
            updateUI();
            if (isGenMode) closeSidebar();
        });
    });

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('visible');
    }
</script>
</body>
</html>
